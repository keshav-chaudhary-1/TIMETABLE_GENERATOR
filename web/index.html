<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timetable Portal Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-login" data-page="login">
    <div class="login-scene">
      <div class="login-overlay"></div>
      <div class="login-glow login-glow-a"></div>
      <div class="login-glow login-glow-b"></div>

      <main class="login-layout">
        <section class="login-copy">
          <span class="eyebrow">Graphic Era Timetable Portal</span>
          <h1>Academic TimeTable For Second Year<!--scheduling, designed to feel premium.--></h1>
          <!-- <p>
            A polished web layer for your C++ timetable engine with live
            section, teacher, and room views.
          </p> -->
          <div class="copy-chips">
            <span>Section Flow</span>
            <span>Teacher Flow</span>
            <span>Room Insights</span>
          </div>
        </section>

        <section class="login-card-shell">
          <div class="login-card">
            <div class="brand-lockup">
              <div class="brand-badge">GE</div>
              <div>
                <p class="brand-kicker">Timetable Portal</p>
                <h2>Sign in to continue</h2>
              </div>
            </div>

            <form id="loginForm" class="login-form">
              <label>
                <span>User ID</span>
                <input id="userId" name="userId" type="text" placeholder="Enter your user ID" required />
              </label>

              <label>
                <span>Password</span>
                <input id="password" name="password" type="password" placeholder="Enter password" required />
              </label>

              <!-- <div class="auth-help">
                <p class="auth-help-title">Access rules</p>
                <p>Admin login uses username `Geu` and password `Geu-admin`.</p>
                <p>Student login uses registered student IDs with password `Timer@123`.</p>
              </div> -->

              <p id="authMessage" class="auth-message" aria-live="polite"></p>

              <div class="login-actions">
                <!-- <span class="ghost-note">Role-based access for admin and registered students</span> -->
                <button type="submit" class="primary-button">Login</button>
              </div>
            </form>
          </div>
        </section>
      </main>

      <div class="team-signature">TEAM TIME HACKER</div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
  </body>
</html>
